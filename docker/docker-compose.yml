services:
  server:
    image: ghcr.io/kevinbonnoron/sirene:latest
    ports:
      - "80:80"
    volumes:
      - sirene-data:/app/db/pb_data
    env_file:
      - .env
    restart: unless-stopped

  inference:
    image: ghcr.io/kevinbonnoron/sirene-inference:latest
    environment:
      # Compose runs server + inference on a private docker network, so unauthenticated
      # mode is acceptable here. Remote workers must instead set INFERENCE_AUTH_TOKEN.
      INFERENCE_ALLOW_NO_AUTH: "true"
    volumes:
      - sirene-models:/app/data/models
      - sirene-packages:/app/data/packages
    restart: unless-stopped

volumes:
  sirene-data:
  sirene-models:
  sirene-packages:
